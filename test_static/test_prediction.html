<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CocoGuard - Pest Detection Test</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a5f2a 0%, #2d8f3e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .upload-area {
            border: 3px dashed #1a5f2a;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8fff8;
        }
        .upload-area:hover {
            background: #e8ffe8;
            border-color: #2d8f3e;
        }
        .upload-area.dragover {
            background: #d8ffd8;
            border-color: #2d8f3e;
        }
        .upload-icon {
            font-size: 48px;
            color: #1a5f2a;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #333;
            font-size: 16px;
        }
        #fileInput {
            display: none;
        }
        .preview-container {
            margin-top: 20px;
            text-align: center;
        }
        #previewImage {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #1a5f2a 0%, #2d8f3e 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(26, 95, 42, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .results {
            display: none;
        }
        .results.show {
            display: block;
        }
        .result-header {
            font-size: 24px;
            color: #1a5f2a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .detection-item {
            background: #f8fff8;
            border-left: 4px solid #1a5f2a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
        }
        .pest-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        .confidence {
            font-size: 16px;
            color: #666;
            margin-top: 5px;
        }
        .confidence-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #1a5f2a, #2d8f3e);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .risk-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        .risk-low { background: #d4edda; color: #155724; }
        .risk-medium { background: #fff3cd; color: #856404; }
        .risk-high { background: #f8d7da; color: #721c24; }
        .no-detection {
            text-align: center;
            padding: 30px;
            color: #666;
        }
        .model-info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .model-info h3 {
            color: #1a5f2a;
            margin-bottom: 10px;
        }
        .label-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .label-tag {
            background: #1a5f2a;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a5f2a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .api-url {
            background: #333;
            color: #0f0;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: monospace;
            margin: 10px 0;
        }
        .threshold-control {
            margin: 15px 0;
        }
        .threshold-control label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        .threshold-control input[type="range"] {
            width: 100%;
        }
        .threshold-value {
            text-align: center;
            font-weight: bold;
            color: #1a5f2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥥 CocoGuard Pest Detection</h1>
        
        <div class="card">
            <h3 style="margin-bottom: 15px;">API Configuration</h3>
            <div class="api-url" id="apiUrl">http://localhost:8000/predict</div>
            
            <div class="threshold-control">
                <label for="threshold">Confidence Threshold: <span id="thresholdValue">30%</span></label>
                <input type="range" id="threshold" min="0" max="100" value="30">
            </div>
        </div>

        <div class="card" id="modelInfoCard">
            <div class="model-info">
                <h3>🔬 Model Information</h3>
                <p id="modelStatus">Loading model info...</p>
                <div class="label-list" id="labelList"></div>
            </div>
        </div>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📷</div>
                <div class="upload-text">
                    <strong>Click to upload</strong> or drag and drop<br>
                    <small>Supports: JPG, PNG, WEBP</small>
                </div>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            
            <div class="preview-container">
                <img id="previewImage" src="" alt="Preview">
            </div>
            
            <button class="btn" id="analyzeBtn" disabled>🔍 Analyze Image</button>
        </div>

        <div class="card loading" id="loadingCard">
            <div class="spinner"></div>
            <p>Analyzing image for pests...</p>
        </div>

        <div class="card results" id="resultsCard">
            <div class="result-header">
                <span>🐛</span>
                <span>Detection Results</span>
            </div>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let selectedFile = null;

        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loadingCard = document.getElementById('loadingCard');
        const resultsCard = document.getElementById('resultsCard');
        const resultsContent = document.getElementById('resultsContent');
        const thresholdInput = document.getElementById('threshold');
        const thresholdValue = document.getElementById('thresholdValue');
        const modelStatus = document.getElementById('modelStatus');
        const labelList = document.getElementById('labelList');

        // Load model info on page load
        async function loadModelInfo() {
            try {
                const response = await fetch(`${API_BASE}/predict/model-info`);
                const data = await response.json();
                
                if (data.model_loaded) {
                    modelStatus.innerHTML = `✅ Model loaded successfully (${data.num_classes} pest types)`;
                    labelList.innerHTML = data.labels.map(label => 
                        `<span class="label-tag">${label}</span>`
                    ).join('');
                } else {
                    modelStatus.innerHTML = '❌ Model not loaded';
                }
            } catch (error) {
                modelStatus.innerHTML = `❌ Error: ${error.message}`;
            }
        }

        // Threshold slider
        thresholdInput.addEventListener('input', (e) => {
            thresholdValue.textContent = `${e.target.value}%`;
        });

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Handle file selection
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }

            selectedFile = file;
            
            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
            };
            reader.readAsDataURL(file);

            // Enable analyze button
            analyzeBtn.disabled = false;
            
            // Hide previous results
            resultsCard.classList.remove('show');
        }

        // Analyze button click
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // Show loading
            loadingCard.classList.add('show');
            resultsCard.classList.remove('show');
            analyzeBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('file', selectedFile);

                const threshold = thresholdInput.value / 100;
                const url = `${API_BASE}/predict?confidence_threshold=${threshold}&save_image=false`;

                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Prediction failed');
                }

                displayResults(data);
            } catch (error) {
                resultsContent.innerHTML = `
                    <div class="no-detection">
                        <h3>❌ Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
                resultsCard.classList.add('show');
            } finally {
                loadingCard.classList.remove('show');
                analyzeBtn.disabled = false;
            }
        });

        // Display results
        function displayResults(data) {
            if (!data.success) {
                resultsContent.innerHTML = `
                    <div class="no-detection">
                        <h3>❌ Analysis Failed</h3>
                        <p>${data.error || 'Unknown error'}</p>
                    </div>
                `;
            } else if (data.predictions.length === 0) {
                resultsContent.innerHTML = `
                    <div class="no-detection">
                        <h3>✅ No Pests Detected</h3>
                        <p>The image does not appear to contain any recognizable pests above the confidence threshold.</p>
                    </div>
                `;
            } else {
                resultsContent.innerHTML = data.predictions.map(pred => `
                    <div class="detection-item">
                        <span class="pest-name">${pred.pest_type}</span>
                        ${pred.risk_level ? `<span class="risk-badge risk-${pred.risk_level.toLowerCase()}">${pred.risk_level} Risk</span>` : ''}
                        <div class="confidence">Confidence: ${pred.confidence.toFixed(1)}%</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${pred.confidence}%"></div>
                        </div>
                    </div>
                `).join('');
            }

            resultsCard.classList.add('show');
        }

        // Initialize
        loadModelInfo();
    </script>
</body>
</html>
